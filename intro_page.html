<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Introdutória</title>
    <link href="calli_style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header class="flexbox_container_top_center">

        <img src="calli_title.png" width="400">
        
    </header>
    
    <br>

    <main>

        <div class="flexbox_container_mid_center">
            <form>
                <div class="flexbox_container_mid_center">
                    <input type="email" id="user_email" name="user_email" placeholder="Email">
                </div>

                <br><br>
                
                <div class="flexbox_container_mid_center">
                    <input type="text" id="user_full_name" name="user_full_name" placeholder="Nome completo">
                </div>

                <br><br>
                
                <div class="flexbox_container_mid_center">
                    <input type="number" min="0" max="150" id="user_age" name="user_age" placeholder="Idade">
                </div>

                <br><br>

                <div class="flexbox_container_mid_center">
                    <input type="number" step="0.01" min="0" max="300" id="user_height" name="user_height" placeholder="Altura em Cm">
                </div>

                <br><br>

                <div class="flexbox_container_mid_center">
                    <input type="number" step="0.01" min="0" max="1000" id="user_weight" name="user_weight" placeholder="Peso em Kg">
                </div>

                <br><br>

                <div class="flexbox_container_mid_center">
                    <button class="ghost_button" type="submit" onclick="home_page.html">OK</button>
                </div>

                <br><br>

            </form>
        </div>

    </main>

</body>
</html>
