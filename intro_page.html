<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Introdutória</title>
    <link href="calli_style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header class="flexbox_container_top_center">

        <img src="calli_title.png" width="400">
        
    </header>
    
    <br>

    <main>

        <div class="flexbox_container_mid_center">
            <form>
                <div class="flexbox_container_mid_center">
                    <input required type="email" id="user_email" name="user_email" placeholder="Email">
                </div>

                <br><br>
                
                <div class="flexbox_container_mid_center">
                    <input required type="text" id="user_name" name="user_name" placeholder="Nome de usuário">
                </div>

                <br><br>

                <div class="flexbox_container_mid_center">
                    <input required type="password" id="user_password" name="user_password" placeholder="Senha">
                </div>

                <br><br>

                <div class="flexbox_container_mid_center">
                    <button class="ghost_button" type="submit" onclick="window.location.href='home_page.html'">OK</button>
                </div>

                <br><br>

            </form>
        </div>

    </main>

</body>
</html>
